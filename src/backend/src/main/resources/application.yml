spring:
  application:
    name: unihub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/unihub}
    username: ${DB_USERNAME:unihub}
    password: ${DB_PASSWORD:unihub}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:dev-only-jwt-secret-change-before-production}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:no-reply@unihub.local}
    queue:
      enabled: ${APP_MAIL_QUEUE_ENABLED:false}
      stream: ${APP_MAIL_QUEUE_STREAM:unihub-mail-jobs}
      consumer-group: ${APP_MAIL_QUEUE_CONSUMER_GROUP:unihub-mail-group}
      consumer-name: ${APP_MAIL_QUEUE_CONSUMER_NAME:${spring.application.name}}
      max-retries: ${APP_MAIL_QUEUE_MAX_RETRIES:3}
      poll-interval-ms: ${APP_MAIL_QUEUE_POLL_INTERVAL_MS:5000}
  qr:
    issuer: ${APP_QR_ISSUER:unihub}
    ttl-minutes: ${APP_QR_TTL_MINUTES:10080}
    image-size: ${APP_QR_IMAGE_SIZE:320}
  payment:
    pending-expiration-minutes: ${APP_PAYMENT_PENDING_EXPIRATION_MINUTES:15}
    zalopay:
      app-id: ${APP_PAYMENT_ZALOPAY_APP_ID:}
      key1: ${APP_PAYMENT_ZALOPAY_KEY1:}
      key2: ${APP_PAYMENT_ZALOPAY_KEY2:}
      endpoint: ${APP_PAYMENT_ZALOPAY_ENDPOINT:https://sb-openapi.zalopay.vn/v2/create}
      connect-timeout-ms: ${APP_PAYMENT_ZALOPAY_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${APP_PAYMENT_ZALOPAY_READ_TIMEOUT_MS:5000}
      callback-url: ${APP_PAYMENT_ZALOPAY_CALLBACK_URL:}
      frontend-return-url: ${APP_PAYMENT_ZALOPAY_FRONTEND_RETURN_URL:}
      enabled: ${APP_PAYMENT_ZALOPAY_ENABLED:false}
      sandbox-mode: ${APP_PAYMENT_ZALOPAY_SANDBOX_MODE:true}
  csv-import:
    enabled: ${APP_CSV_IMPORT_ENABLED:false}
    input-directory: ${APP_CSV_IMPORT_INPUT_DIRECTORY:./data/import}
    file-pattern: ${APP_CSV_IMPORT_FILE_PATTERN:students-*.csv}
    cron: ${APP_CSV_IMPORT_CRON:0 0 2 * * *}
    timezone: ${APP_CSV_IMPORT_TIMEZONE:Asia/Ho_Chi_Minh}
    encoding: ${APP_CSV_IMPORT_ENCODING:UTF-8}
    delimiter: ${APP_CSV_IMPORT_DELIMITER:,}
    batch-size: ${APP_CSV_IMPORT_BATCH_SIZE:500}
    record-missing-batch: ${APP_CSV_IMPORT_RECORD_MISSING_BATCH:false}
  ai-summary:
    enabled: ${APP_AI_SUMMARY_ENABLED:true}
    provider: ${APP_AI_SUMMARY_PROVIDER:gemini}
    worker-enabled: ${APP_AI_SUMMARY_WORKER_ENABLED:true}
    poll-interval-ms: ${APP_AI_SUMMARY_POLL_INTERVAL_MS:5000}
    max-file-size-mb: ${APP_AI_SUMMARY_MAX_FILE_SIZE_MB:10}
    max-input-chars: ${APP_AI_SUMMARY_MAX_INPUT_CHARS:20000}
    timeout-seconds: ${APP_AI_SUMMARY_TIMEOUT_SECONDS:30}
    storage:
      type: ${APP_AI_SUMMARY_STORAGE_TYPE:local}
      local-directory: ${APP_AI_SUMMARY_STORAGE_LOCAL_DIRECTORY:./data/object-storage/workshop-documents}
    gemini:
      api-key: ${APP_AI_SUMMARY_GEMINI_API_KEY:}
      base-url: ${APP_AI_SUMMARY_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      model: ${APP_AI_SUMMARY_GEMINI_MODEL:gemini-2.5-flash-lite}

server:
  port: ${PORT:8080}
