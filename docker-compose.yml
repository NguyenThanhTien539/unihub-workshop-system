services:
  unihub-postgres:
    image: postgres:16
    container_name: unihub-postgres
    environment:
      POSTGRES_DB: unihub
      POSTGRES_USER: unihub
      POSTGRES_PASSWORD: unihub
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unihub -d unihub"]
      interval: 5s
      timeout: 5s
      retries: 10

  unihub-web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: unihub-web
    ports:
      - "3000:3000"
    depends_on:
      - unihub-backend

  unihub-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unihub-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://unihub-postgres:5432/unihub}
      DB_USERNAME: ${DB_USERNAME:-unihub}
      DB_PASSWORD: ${DB_PASSWORD:-unihub}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-before-production}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-15}
      JWT_REFRESH_TOKEN_TTL_DAYS: ${JWT_REFRESH_TOKEN_TTL_DAYS:-7}
    depends_on:
      unihub-postgres:
        condition: service_healthy
    restart: unless-stopped

