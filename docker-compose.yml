services:
  postgres:
    image: postgres:16-alpine
    container_name: unihub-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unihub}
      POSTGRES_USER: ${POSTGRES_USER:-unihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unihub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unihub} -d ${POSTGRES_DB:-unihub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  unihub-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unihub-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/unihub}
      DB_USERNAME: ${DB_USERNAME:-unihub}
      DB_PASSWORD: ${DB_PASSWORD:-unihub}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-before-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_QUEUE_ENABLED: ${APP_MAIL_QUEUE_ENABLED:-false}
      APP_PAYMENT_ZALOPAY_ENABLED: ${APP_PAYMENT_ZALOPAY_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  unihub-web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: unihub-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - unihub-backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
