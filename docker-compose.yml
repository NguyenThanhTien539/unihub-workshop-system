version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  unihub-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unihub-backend
    ports:
      - "8080:8080"
    env_file:
      - ./src/backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  unihub-web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: unihub-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - unihub-backend
    restart: unless-stopped

volumes:
  redis_data:
