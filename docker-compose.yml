version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: unihub-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  unihub-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unihub-backend
    ports:
      - "8080:8080"
    env_file:
      - ./src/backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APP_AI_SUMMARY_STORAGE_TYPE: minio
      APP_AI_SUMMARY_STORAGE_BUCKET: unihub-documents
      APP_AI_SUMMARY_STORAGE_ENDPOINT: http://minio:9000
      APP_AI_SUMMARY_STORAGE_REGION: ap-southeast-1
      APP_AI_SUMMARY_STORAGE_ACCESS_KEY: minioadmin
      APP_AI_SUMMARY_STORAGE_SECRET_KEY: minioadmin123
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  unihub-web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: unihub-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - unihub-backend
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
