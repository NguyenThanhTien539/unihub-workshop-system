spring:
  application:
    name: unihub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/unihub}
    username: ${DB_USERNAME:unihub}
    password: ${DB_PASSWORD:unihub}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:dev-only-jwt-secret-change-before-production}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

server:
  port: ${PORT:8080}
