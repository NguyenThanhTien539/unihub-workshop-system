spring:
  application:
    name: unihub

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:no-reply@unihub.local}
    queue:
      enabled: ${APP_MAIL_QUEUE_ENABLED:false}
      stream: ${APP_MAIL_QUEUE_STREAM:unihub-mail-jobs}
      consumer-group: ${APP_MAIL_QUEUE_CONSUMER_GROUP:unihub-mail-group}
      consumer-name: ${APP_MAIL_QUEUE_CONSUMER_NAME:${spring.application.name}}
      max-retries: ${APP_MAIL_QUEUE_MAX_RETRIES:3}
      poll-interval-ms: ${APP_MAIL_QUEUE_POLL_INTERVAL_MS:5000}
  qr:
    issuer: ${APP_QR_ISSUER:unihub}
    ttl-minutes: ${APP_QR_TTL_MINUTES:10080}
    image-size: ${APP_QR_IMAGE_SIZE:320}
  payment:
    pending-expiration-minutes: ${APP_PAYMENT_PENDING_EXPIRATION_MINUTES:15}
    zalopay:
      app-id: ${APP_PAYMENT_ZALOPAY_APP_ID:}
      key1: ${APP_PAYMENT_ZALOPAY_KEY1:}
      key2: ${APP_PAYMENT_ZALOPAY_KEY2:}
      endpoint: ${APP_PAYMENT_ZALOPAY_ENDPOINT:https://sb-openapi.zalopay.vn/v2/create}
      callback-url: ${APP_PAYMENT_ZALOPAY_CALLBACK_URL:}
      frontend-return-url: ${APP_PAYMENT_ZALOPAY_FRONTEND_RETURN_URL:}
      enabled: ${APP_PAYMENT_ZALOPAY_ENABLED:false}
      sandbox-mode: ${APP_PAYMENT_ZALOPAY_SANDBOX_MODE:true}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    algorithm: ${APP_RATE_LIMIT_ALGORITHM:token-bucket}
    trust-forwarded-for: ${APP_RATE_LIMIT_TRUST_FORWARDED_FOR:false}
    default-ip-limit: ${APP_RATE_LIMIT_DEFAULT_IP_LIMIT:120}
    default-ip-refill-tokens: ${APP_RATE_LIMIT_DEFAULT_IP_REFILL_TOKENS:120}
    default-ip-refill-period-seconds: ${APP_RATE_LIMIT_DEFAULT_IP_REFILL_PERIOD_SECONDS:60}
    policies:
      login:
        capacity: ${APP_RATE_LIMIT_LOGIN_CAPACITY:10}
        refill-tokens: ${APP_RATE_LIMIT_LOGIN_REFILL_TOKENS:10}
        refill-period-seconds: ${APP_RATE_LIMIT_LOGIN_REFILL_PERIOD_SECONDS:60}
      auth-refresh:
        capacity: ${APP_RATE_LIMIT_AUTH_REFRESH_CAPACITY:30}
        refill-tokens: ${APP_RATE_LIMIT_AUTH_REFRESH_REFILL_TOKENS:30}
        refill-period-seconds: ${APP_RATE_LIMIT_AUTH_REFRESH_REFILL_PERIOD_SECONDS:60}
      registration:
        capacity: ${APP_RATE_LIMIT_REGISTRATION_CAPACITY:5}
        refill-tokens: ${APP_RATE_LIMIT_REGISTRATION_REFILL_TOKENS:5}
        refill-period-seconds: ${APP_RATE_LIMIT_REGISTRATION_REFILL_PERIOD_SECONDS:60}
      payment:
        capacity: ${APP_RATE_LIMIT_PAYMENT_CAPACITY:10}
        refill-tokens: ${APP_RATE_LIMIT_PAYMENT_REFILL_TOKENS:10}
        refill-period-seconds: ${APP_RATE_LIMIT_PAYMENT_REFILL_PERIOD_SECONDS:60}
      checkin-sync:
        capacity: ${APP_RATE_LIMIT_CHECKIN_SYNC_CAPACITY:30}
        refill-tokens: ${APP_RATE_LIMIT_CHECKIN_SYNC_REFILL_TOKENS:30}
        refill-period-seconds: ${APP_RATE_LIMIT_CHECKIN_SYNC_REFILL_PERIOD_SECONDS:60}

server:
  port: ${PORT:8080}
