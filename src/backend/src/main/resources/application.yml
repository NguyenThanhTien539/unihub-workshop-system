spring:
  application:
    name: unihub

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}

server:
  port: ${PORT:8080}
