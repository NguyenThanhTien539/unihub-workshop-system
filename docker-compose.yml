version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: unihub-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  unihub-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unihub-backend
    ports:
      - "8080:8080"
    env_file:
      - ./src/backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      APP_CSV_IMPORT_INPUT_DIRECTORY: /app/data/import

      APP_AI_SUMMARY_STORAGE_TYPE: minio
      APP_AI_SUMMARY_STORAGE_BUCKET: unihub-documents
      APP_AI_SUMMARY_STORAGE_ENDPOINT: http://minio:9000
      APP_AI_SUMMARY_STORAGE_REGION: ap-southeast-1
      APP_AI_SUMMARY_STORAGE_ACCESS_KEY: minioadmin
      APP_AI_SUMMARY_STORAGE_SECRET_KEY: minioadmin123
    volumes:
      - ./data/import:/app/data/import
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
  unihub-web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: unihub-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - unihub-backend
    restart: unless-stopped

  unihub-mobile:
    image: node:20-alpine
    container_name: unihub-mobile
    working_dir: /app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:8080}
      EXPO_NO_TELEMETRY: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./src/mobile:/app
      - mobile_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run web -- --port 8081"
    depends_on:
      - unihub-backend
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  mobile_node_modules:
